<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Scraper | Flask Project</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #667eea;
            border: none;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        footer {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-envelope-paper-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-3">Email Scraper</h3>
                    <p class="text-muted">
                        Upload an Excel file containing website URLs and extract emails automatically.
                    </p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Upload Excel File</label>
                        <input type="file" class="form-control" name="file" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom btn-lg text-white">
                            <i class="bi bi-cloud-download"></i>
                            Scrape Emails
                        </button>
                    </div>
                </form>

                <hr>

                <div class="alert alert-info mt-3" role="alert">
                    <strong>Note:</strong> URLs should be in the <b>first column</b> of the Excel file.
                </div>

                <footer class="text-center mt-3">
                    Flask Mini Project | Web Scraping
                </footer>
            </div>

        </div>
    </div>
</div>

</body>
</html>
